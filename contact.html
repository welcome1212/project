<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Blue Elegance</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding-top: 0;">

    <header id="main-header">
        <nav>
            <a href="index.html" class="logo">BLUE ELEGANCE</a>
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="index.html">Experience</a></li>
                    <li><a href="about.html">Philosophy</a></li>
                    <li><a href="services.html">Curations</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div id="clock" class="clock">00:00:00</div>
            </div>
        </nav>
    </header>

    <section style="margin-top: 100px;">
        <div class="section-header">
            <h2 style="font-size: 3rem;">Contact Us</h2>
            <div class="divider"></div>
        </div>

        <div class="contact-form">
            <form action="#" method="post" onsubmit="return false;">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="성함 또는 기업명을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="연락 가능한 이메일 주소를 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="문의하실 내용을 상세히 작성해주세요"></textarea>
                </div>
                <div style="text-align: center; margin-top: 50px;">
                    <a href="#" class="btn-luxury" style="display: inline-block;">Send Inquiry</a>
                </div>
            </form>
        </div>
    </section>

    <footer style="margin-top: 100px;">
        <a href="index.html" class="footer-logo">Blue Elegance</a>
        <div class="footer-links">
            <a href="about.html">About</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="contact.html">Contact</a>
        </div>
        <p class="copyright">&copy; 2026 BLUE ELEGANCE. THE ART OF DIGITAL SOPHISTICATION.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
